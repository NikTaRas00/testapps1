<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Index</title>
    <style>
        /* CSS Reset & Variable Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fbfbf9; /* Warm off-white */
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        /* Centered Menu Container */
        .menu-card {
            background-color: #ffffff;
            border: 1px solid #e4e4e0;
            border-radius: 4px;
            padding: 48px 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        /* Classic Serif Typography */
        h1 {
            font-family: "Didot", "Bodoni MT", "Cinzel", "Georgia", serif;
            font-size: 2.25rem;
            font-weight: normal;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #111111;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #767672;
            margin-bottom: 32px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Button List Layout */
        .game-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Clean, Minimalist Buttons */
        .game-link {
            display: block;
            padding: 16px 20px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1a1a1a;
            background-color: #fafaf9;
            border: 1px solid #e4e4e0;
            border-radius: 4px;
            text-decoration: none;
            transition: background-color 0.15s ease, border-color 0.15s ease;
        }

        /* Subtle Hover State */
        .game-link:hover {
            background-color: #f1f1ee;
            border-color: #ccccca;
        }

        .game-link:active {
            background-color: #e8e8e5;
        }
    </style>
</head>
<body>

    <div class="menu-card">
        <h1>Web Works in Progress</h1>
        <p class="subtitle">Select a Game</p>

        <nav class="game-list">
            <a href="volt-v1.html" class="game-link">Volt</a>
            <a href="tsubame-v1.html" class="game-link">Tsubame</a>
            <a href="tangent-v1.html" class="game-link">Tangent I</a>
            <a href="tangent-v2.html" class="game-link">Tangent II</a>
            <a href="outerstellar-v1.html" class="game-link">Outerstellar 3D</a>
        </nav>
    </div>

</body>
</html>
