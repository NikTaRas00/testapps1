<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>TANGENT</title>
<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;overflow:hidden;background:#07070A;color:#F5F4F0;
    font-family:-apple-system,system-ui,'Segoe UI',Roboto,sans-serif;
    touch-action:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
  canvas{position:fixed;inset:0;width:100%;height:100%;display:block}
  .ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    padding:24px;pointer-events:none;z-index:5;transition:opacity .16s ease;opacity:1}
  .ov.hide{opacity:0}
  .inner{text-align:center;transition:transform .26s cubic-bezier(.23,1,.32,1)}
  .ov.hide .inner{transform:translateY(14px)}
  .tag{font-size:10px;font-weight:800;letter-spacing:.38em;text-transform:uppercase;
    color:rgba(245,244,240,.45);padding-left:.38em}
  .brand{font-size:clamp(50px,15vw,104px);font-weight:900;letter-spacing:-.02em;
    line-height:.95;margin:10px 0 0;color:#F5F4F0}
  .brand i{font-style:normal;color:#FF4D2E}
  .bar{width:44px;height:4px;background:#FF4D2E;margin:18px auto 20px}
  .how{font-size:13.5px;line-height:1.75;color:rgba(245,244,240,.62);max-width:290px;margin:0 auto}
  .how b{color:#FF4D2E;font-weight:800}
  .cta{margin-top:26px;font-size:12px;font-weight:800;letter-spacing:.32em;text-transform:uppercase;
    padding-left:.32em;color:#FF4D2E;animation:pulse 1.3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .bestline{font-size:10.5px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;
    color:rgba(245,244,240,.4);padding-left:.28em;margin-top:16px}
  .dscore{font-size:clamp(84px,26vw,160px);font-weight:900;line-height:1;margin:8px 0 0;
    letter-spacing:-.03em;font-variant-numeric:tabular-nums}
  .dlabel{font-size:10px;font-weight:800;letter-spacing:.5em;text-transform:uppercase;
    color:rgba(245,244,240,.45);padding-left:.5em;margin-top:4px}
  .newbest{display:inline-block;margin-top:18px;font-size:11px;font-weight:800;letter-spacing:.26em;
    text-transform:uppercase;padding:9px 14px 9px 17px;color:#0A0A0C;background:#FF4D2E;border-radius:3px}
  .newbest.hide{display:none}
  #bMute{position:fixed;top:calc(12px + env(safe-area-inset-top));right:14px;z-index:8;pointer-events:auto;
    width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(245,244,240,.22);
    background:rgba(245,244,240,.04);color:#F5F4F0;font-size:15px;cursor:pointer;
    display:grid;place-items:center;transition:transform .1s ease}
  #bMute:active{transform:scale(.9)}
  @media (prefers-reduced-motion: reduce){
    .cta{animation:none}
    .inner{transition:none}
    .ov.hide .inner{transform:none}
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<button id="bMute" aria-label="Sound on or off">♪</button>

<div class="ov" id="menu">
  <div class="inner">
    <div class="tag">orbit · release · chain</div>
    <h1 class="brand">TANGENT<i>.</i></h1>
    <div class="bar"></div>
    <div class="how">your orbit is decaying —<br><b>tap</b> to let go on the tangent<br>and catch the next well before you burn.</div>
    <div class="bestline" id="mBest" style="display:none">best 0</div>
    <div class="cta">tap to release</div>
  </div>
</div>

<div class="ov hide" id="dead">
  <div class="inner">
    <div class="tag" id="dTag">— burned up —</div>
    <p class="dscore" id="dScore">0</p>
    <div class="dlabel">hops</div>
    <br><span class="newbest hide" id="dNew">new best</span>
    <div class="bestline" id="dBest">best 0</div>
    <div class="cta">tap to go again</div>
  </div>
</div>

<script>
'use strict';
/* =====================================================
   TANGENT — decaying orbits. one tap: let go on the
   tangent, get caught by the next well, don't burn.
   ===================================================== */

const cv=document.getElementById('cv'), cx=cv.getContext('2d');

// ---------- consts ----------
const TAU=Math.PI*2, R=Math.random;
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const lerp=(a,b,t)=>a+(b-a)*t;
const angDiff=x=>{ x=(x%TAU+TAU)%TAU; return x>Math.PI ? x-TAU : x; };
const REDU=window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;
const SH = REDU?0.3:1;

const FG='#F5F4F0', REDD='#FF3B30';
const GRADS=[
  ['#FF4D2E','#FF2E92'],
  ['#FFB01F','#FF5C2E'],
  ['#3DFFAB','#2EC8FF'],
  ['#6E7BFF','#C44DFF'],
  ['#FF5CA8','#FFB01F'],
  ['#E8FF47','#3DFFAB'],
];
function hx(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function rgba(c,a){ return 'rgba('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+','+a+')'; }
function mixC(a,b,k){ return [lerp(a[0],b[0],k),lerp(a[1],b[1],k),lerp(a[2],b[2],k)]; }

// ---------- sizing / prerender ----------
let W=0,H=0,DPR=1;
let vig=document.createElement('canvas');
let grainPat=null;
let dust=[];

function makeGrain(){
  const t=document.createElement('canvas');
  t.width=128; t.height=128;
  const g=t.getContext('2d');
  const im=g.createImageData(128,128);
  for(let i=0;i<im.data.length;i+=4){
    const v=(R()*255)|0;
    im.data[i]=v; im.data[i+1]=v; im.data[i+2]=v;
    im.data[i+3]=7+(R()*11)|0;
  }
  g.putImageData(im,0,0);
  grainPat=cx.createPattern(t,'repeat');
}
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth; H=window.innerHeight;
  cv.width=W*DPR; cv.height=H*DPR;
  makeVig();
  if(!grainPat) makeGrain();
  dust=[];
  for(let i=0;i<34;i++) dust.push({x:R()*W,y:R()*H,dep:.25+R()*.45,r:.6+R()*1.1});
}
function makeVig(){
  vig.width=W*DPR; vig.height=H*DPR;
  const v=vig.getContext('2d');
  v.setTransform(DPR,0,0,DPR,0,0);
  const g=v.createRadialGradient(W/2,H*.45,Math.min(W,H)*.35,W/2,H*.45,Math.max(W,H)*.92);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.55)');
  v.fillStyle=g; v.fillRect(0,0,W,H);
}

// ---------- audio ----------
let AC=null, master=null, muted=false, _nb=null;
function audio(){
  if(AC){ if(AC.state==='suspended')AC.resume(); return; }
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=muted?0:.5; master.connect(AC.destination);
    hum();
  }catch(e){}
}
function noiseBuf(){
  if(_nb) return _nb;
  const b=AC.createBuffer(1,AC.sampleRate,AC.sampleRate), d=b.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=R()*2-1;
  _nb=b; return b;
}
function hum(){
  for(const f of [55,55.6]){
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine'; o.frequency.value=f; g.gain.value=.005;
    o.connect(g); g.connect(master); o.start();
  }
}
function tone(type,f0,f1,dur,vol,delay){
  if(!AC) return;
  const t=AC.currentTime+(delay||0);
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.setValueAtTime(f0,t);
  if(f1) o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t+dur+.05);
}
function noiz(dur,vol,f0,f1,type,delay){
  if(!AC) return;
  const t=AC.currentTime+(delay||0);
  const n=AC.createBufferSource(); n.buffer=noiseBuf(); n.loop=true;
  const f=AC.createBiquadFilter(); f.type=type||'bandpass';
  f.frequency.setValueAtTime(f0,t);
  if(f1) f.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  const g=AC.createGain();
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(.0001,t+dur);
  n.connect(f); f.connect(g); g.connect(master);
  n.start(t); n.stop(t+dur+.05);
}
const PENT=[0,3,5,7,10];
function noteF(n){
  const st=PENT[n%5]+12*Math.floor((n%15)/5);
  return 196*Math.pow(2,st/12);
}
function sHit(n,perf){
  const f=noteF(n);
  tone('triangle',f,0,.16,.3);
  tone('sine',150,60,.07,.18);
  if(perf){ tone('triangle',f*1.5,0,.2,.22); tone('sine',f*4,0,.09,.07); }
}
function sRelease(){ noiz(.12,.3,500,2300); tone('sine',110,60,.08,.16); }
function sArp(){ tone('triangle',523,0,.1,.2); tone('triangle',659,0,.1,.2,.07); tone('triangle',784,0,.16,.22,.14); }
function sDie(){ tone('sawtooth',280,38,.5,.32); noiz(.35,.4,2400,180,'lowpass'); }
function sGo(){ tone('square',392,0,.06,.12); }
function vib(p){ if(navigator.vibrate) navigator.vibrate(p); }

// ---------- state ----------
let state='menu';           // menu | play | dead
let wells=[];
const player={mode:'orbit', wi:0, th:-Math.PI/2, r:60, dirO:1, x:0, y:0, vx:0, vy:0};
let lastWell=-1;
let score=0, best=0, perfStreak=0, lvl=0;
let camY=0;
let freeze=0, shake=0, pop=0, flash=0, dflash=0, tScale=1;
let deathAt=0;
let parts=[], floats=[], rings=[], trail=[];

const GA=()=>hx(GRADS[lvl%GRADS.length][0]);
const GB=()=>hx(GRADS[lvl%GRADS.length][1]);
const omega=()=>Math.min(4.2, 2.2+score*.022);
const decay=()=>Math.min(34, 10+score*.35);

function curWell(){ return wells[player.wi]; }

// ---------- world ----------
function makeWell(x,y){
  return {x0:x, x, y, ringR:clamp(62-score*.25,44,62)*(0.9+R()*.2),
          coreR:10, sweetA:R()*TAU,
          swAmp: score>=15 ? 16+R()*24 : 0, swSp:.5+R()*.6, ph:R()*TAU};
}
function topWellY(){
  let m=1e9;
  for(const w of wells) m=Math.min(m,w.y);
  return m===1e9?0:m;
}
function spawnAhead(){
  while(wells.length===0 || topWellY() > camY - H*1.2){
    if(wells.length===0){ wells.push(makeWell(W/2,0)); continue; }
    let prev=null, py=1e9;
    for(const w of wells) if(w.y<py){py=w.y; prev=w;}
    const dy=150+R()*90, dx=(R()*2-1)*170;
    const nx=clamp(prev.x0+dx, 74, W-74);
    wells.push(makeWell(nx, prev.y-dy));
  }
  for(let i=wells.length-1;i>=0;i--){
    if(wells[i].y > camY+H*1.7 && i!==player.wi && wells.length>3){
      wells.splice(i,1);
      if(player.wi>i) player.wi--;
      if(lastWell>i) lastWell--; else if(lastWell===i) lastWell=-1;
    }
  }
}
function buildWorld(){
  wells=[];
  camY=-H*0.58;
  spawnAhead();
  player.mode='orbit'; player.wi=0; player.th=-Math.PI/2;
  player.dirO=R()<.5?1:-1; player.r=wells[0].ringR;
  lastWell=-1;
  syncOrbitPos();
  trail=[];
}
function syncOrbitPos(){
  const w=curWell();
  player.x=w.x+Math.cos(player.th)*player.r;
  player.y=w.y+Math.sin(player.th)*player.r;
}

// ---------- fx ----------
function burst(x,y,n,col,spd,size){
  for(let i=0;i<n;i++){
    const an=R()*TAU, s=spd*(.3+R()*.7);
    parts.push({x,y,vx:Math.cos(an)*s,vy:Math.sin(an)*s,t:0,tt:.35+R()*.4,
                r:size*(.4+R()*.6),c:col});
  }
}
function fl(x,y,txt,col){ floats.push({x,y,txt,c:col,t:0}); }
function ring(x,y,c,sp){ rings.push({x,y,c,sp,t:0}); }

// ---------- core actions ----------
function start(){
  score=0; perfStreak=0; lvl=0;
  tScale=1; freeze=0; dflash=0; flash=0;
  parts=[]; floats=[]; rings=[];
  buildWorld();
  state='play';
  document.getElementById('menu').classList.add('hide');
  document.getElementById('dead').classList.add('hide');
  sGo();
}

function release(){
  const w=curWell();
  const v=Math.max(150, omega()*player.r);
  player.vx=-Math.sin(player.th)*v*player.dirO;
  player.vy= Math.cos(player.th)*v*player.dirO;
  player.mode='fly';
  lastWell=player.wi;
  burst(player.x,player.y,6,rgba(GA(),1),120,2.2);
  sRelease(); vib(6);
}

function capture(i,dist){
  const w=wells[i];
  const rx=player.x-w.x, ry=player.y-w.y;
  const cr=rx*player.vy-ry*player.vx;
  player.dirO = cr>=0?1:-1;
  player.th=Math.atan2(ry,rx);
  player.r=Math.max(dist, w.coreR+10);
  player.mode='orbit'; player.wi=i;
  syncOrbitPos();

  const perfect = Math.abs(angDiff(player.th - w.sweetA)) < .38;
  const gain=(perfect?2:1)+(perfStreak>=3?1:0);
  score+=gain;
  if(perfect) perfStreak++; else perfStreak=0;

  freeze=perfect?.09:.05;
  pop=1;
  shake=Math.min(9,shake+(perfect?4.5:2.2)*SH);
  burst(player.x,player.y,perfect?15:8, perfect?FG:rgba(GA(),1), 220, 2.6);
  ring(w.x,w.y,rgba(GA(),1),perfect?300:220);
  fl(player.x,player.y-16, perfect?('+'+gain+' perfect'):('+'+gain), perfect?rgba(GB(),1):FG);
  sHit(score,perfect); vib(perfect?18:8);

  const before=Math.floor((score-gain)/10), after=Math.floor(score/10);
  if(after>before){
    lvl=after; flash=.9;
    ring(w.x,w.y,rgba(GB(),1),460);
    sArp();
  }
}

function die(type){
  state='dead'; deathAt=performance.now();
  best=Math.max(best,score);
  tScale=.18;
  burst(player.x,player.y,26,REDD,320,3.4);
  burst(player.x,player.y,12,FG,220,2.6);
  ring(player.x,player.y,REDD,300);
  shake=Math.min(15,13*SH); dflash=REDU?.25:.7;
  sDie(); vib([40,50,80]);
  document.getElementById('dTag').textContent = type==='burn' ? '— burned up —' : '— lost to the void —';
  const el=document.getElementById('dScore');
  if(REDU || score===0){ el.textContent=score; }
  else{
    const t0=performance.now(), dur=Math.min(900,260+score*16);
    (function cnt(){
      const k=Math.min(1,(performance.now()-t0)/dur);
      el.textContent=Math.round(score*(1-Math.pow(1-k,3)));
      if(k<1) requestAnimationFrame(cnt);
    })();
  }
  document.getElementById('dBest').textContent='best '+best;
  document.getElementById('dNew').classList.toggle('hide', !(score>0 && score===best));
  document.getElementById('dead').classList.remove('hide');
}

function attempt(){
  if(state==='menu'){ start(); return; }
  if(state==='dead'){
    if(performance.now()-deathAt>420) start();
    return;
  }
  if(player.mode==='orbit') release();
}

// ---------- update ----------
function update(dt){
  pop=Math.max(0,pop-dt*5);
  flash=Math.max(0,flash-dt*3);
  dflash=Math.max(0,dflash-dt*2.2);
  shake*=Math.pow(.0005,dt);
  tScale=lerp(tScale,1,1-Math.exp(-dt*3));

  const tn=performance.now()/1000;
  for(const w of wells){ w.x = w.x0 + (w.swAmp?Math.sin(tn*w.swSp+w.ph)*w.swAmp:0); }

  for(let i=trail.length-1;i>=0;i--){ trail[i].t+=dt; if(trail[i].t>.3) trail.splice(i,1); }
  const dts=dt*tScale;
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.t+=dts;
    p.x+=p.vx*dts; p.y+=p.vy*dts;
    p.vx*=Math.exp(-dts*3); p.vy*=Math.exp(-dts*3);
    if(p.t>p.tt) parts.splice(i,1);
  }
  for(let i=floats.length-1;i>=0;i--){
    const f=floats[i]; f.t+=dt; f.y-=32*dt;
    if(f.t>.7) floats.splice(i,1);
  }
  for(let i=rings.length-1;i>=0;i--){ rings[i].t+=dt; if(rings[i].t>.5) rings.splice(i,1); }

  if(freeze>0){ freeze-=dt; return; }

  if(state==='menu'){
    player.th+=1.1*player.dirO*dt;
    syncOrbitPos();
    trail.push({x:player.x,y:player.y,t:0});
    return;
  }
  if(state!=='play') return;

  if(player.mode==='orbit'){
    player.th+=omega()*player.dirO*dt;
    player.r-=decay()*dt;
    syncOrbitPos();
    if(player.r<=curWell().coreR+4){ die('burn'); return; }
  } else {
    player.x+=player.vx*dt;
    player.y+=player.vy*dt;
    // capture scan
    let bi=-1, bd=1e9;
    for(let i=0;i<wells.length;i++){
      if(i===lastWell) continue;
      const w=wells[i];
      const d=Math.hypot(player.x-w.x, player.y-w.y);
      if(d<bd){bd=d; bi=i;}
    }
    if(bi>=0){
      const w=wells[bi];
      if(bd < w.coreR+5){ die('burn'); return; }
      if(bd < w.ringR+20){ capture(bi,bd); }
    }
    // void
    if(player.x<-40||player.x>W+40||player.y>camY+H+50||bd>H*1.5){ die('void'); return; }
  }
  trail.push({x:player.x,y:player.y,t:0});
  if(trail.length>24) trail.shift();

  // camera ascends only
  const desired=player.y-H*0.58;
  if(desired<camY) camY+=(desired-camY)*(1-Math.exp(-dt*6));

  spawnAhead();
}

// ---------- render ----------
function render(){
  cx.setTransform(DPR,0,0,DPR,0,0);
  cx.fillStyle='#07070A'; cx.fillRect(0,0,W,H);

  // depth dust
  cx.fillStyle=FG;
  for(const d of dust){
    let yy=(d.y - camY*d.dep)%H; if(yy<0)yy+=H;
    cx.globalAlpha=.05+d.dep*.04;
    cx.beginPath(); cx.arc(d.x,yy,d.r,0,TAU); cx.fill();
  }
  cx.globalAlpha=1;
  cx.drawImage(vig,0,0,W,H);

  cx.save();
  cx.translate((R()*2-1)*shake, (R()*2-1)*shake - camY);

  const A=GA(), B=GB();

  // wells
  for(let i=0;i<wells.length;i++){
    const w=wells[i];
    if(w.y<camY-90||w.y>camY+H+90) continue;
    const cur = state!=='dead' && player.mode==='orbit' && i===player.wi;
    // ring
    cx.strokeStyle=FG; cx.globalAlpha=cur?.22:.11; cx.lineWidth=1.25;
    cx.beginPath(); cx.arc(w.x,w.y,w.ringR,0,TAU); cx.stroke();
    // sweet marker
    cx.fillStyle=FG; cx.globalAlpha=.75;
    cx.beginPath();
    cx.arc(w.x+Math.cos(w.sweetA)*w.ringR, w.y+Math.sin(w.sweetA)*w.ringR, 2.4, 0, TAU);
    cx.fill();
    // core
    cx.globalAlpha=1;
    cx.fillStyle='#101015';
    cx.beginPath(); cx.arc(w.x,w.y,w.coreR,0,TAU); cx.fill();
    cx.strokeStyle=FG; cx.globalAlpha=.15; cx.lineWidth=1;
    cx.beginPath(); cx.arc(w.x,w.y,w.coreR,0,TAU); cx.stroke();
    cx.globalAlpha=1;
    cx.fillStyle=rgba(A,1);
    cx.beginPath(); cx.arc(w.x,w.y,3.4,0,TAU); cx.fill();
    // decaying orbit of the occupied well
    if(cur){
      cx.strokeStyle=rgba(A,1); cx.globalAlpha=.45; cx.lineWidth=1.25;
      cx.beginPath(); cx.arc(w.x,w.y,player.r,0,TAU); cx.stroke();
      cx.globalAlpha=1;
    }
  }

  // trail — the one gradient
  {
    const n=trail.length;
    for(let i=1;i<n;i++){
      const k=i/n;
      const p0=trail[i-1], p1=trail[i];
      cx.strokeStyle=rgba(mixC(B,A,k),1);
      cx.globalAlpha=.42*k*k; cx.lineWidth=5*k+.4; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(p0.x,p0.y); cx.lineTo(p1.x,p1.y); cx.stroke();
    }
    cx.globalAlpha=1;
  }
  // player
  if(state!=='dead'){
    cx.fillStyle=rgba(A,1);
    cx.globalAlpha=.5; cx.beginPath(); cx.arc(player.x,player.y,7,0,TAU); cx.fill();
    cx.fillStyle='#FFFFFF';
    cx.globalAlpha=1; cx.beginPath(); cx.arc(player.x,player.y,3,0,TAU); cx.fill();
  }
  // particles
  for(const p of parts){
    const k=1-p.t/p.tt;
    cx.fillStyle=p.c; cx.globalAlpha=k;
    cx.beginPath(); cx.arc(p.x,p.y,p.r*k+.4,0,TAU); cx.fill();
  }
  cx.globalAlpha=1;
  // ring pulses
  for(const rg of rings){
    const k=rg.t/.5;
    cx.strokeStyle=rg.c; cx.globalAlpha=(1-k)*.5; cx.lineWidth=2.2*(1-k)+.5;
    cx.beginPath(); cx.arc(rg.x,rg.y,6+rg.sp*rg.t,0,TAU); cx.stroke();
  }
  cx.globalAlpha=1;
  // floats
  cx.textAlign='center';
  for(const f of floats){
    cx.fillStyle=f.c; cx.globalAlpha=Math.max(0,1-f.t/.7);
    cx.font='800 14px system-ui,sans-serif';
    cx.fillText(f.txt,f.x,f.y);
  }
  cx.globalAlpha=1;
  cx.restore(); // camera + shake

  // HUD
  if(state==='play'){
    cx.textAlign='center';
    if(best>0){
      if(score>best){
        cx.fillStyle=rgba(GB(),1);
        cx.globalAlpha=.65+.3*Math.sin(performance.now()/140);
        cx.font='800 10.5px system-ui,sans-serif';
        cx.fillText('N E W   B E S T', W/2, 32);
      } else {
        cx.fillStyle=FG; cx.globalAlpha=.35;
        cx.font='700 10.5px system-ui,sans-serif';
        cx.fillText('B E S T   '+best, W/2, 32);
      }
    }
    const sc=1+pop*.12;
    cx.save();
    cx.translate(W/2,86); cx.scale(sc,sc);
    cx.textBaseline='middle';
    cx.fillStyle=FG; cx.globalAlpha=1;
    cx.font='900 54px system-ui,sans-serif';
    cx.fillText(String(score),0,0);
    cx.globalAlpha=.45;
    cx.font='800 9px system-ui,sans-serif';
    cx.fillText('H O P S',0,38);
    if(perfStreak>=3){
      cx.fillStyle=rgba(GA(),1);
      cx.globalAlpha=1;
      cx.fillRect(-22,50,44,3);
      cx.globalAlpha=.65+.3*Math.sin(performance.now()/90);
      cx.fillText('S T R E A K  + 1',0,66);
    }
    cx.restore();
    cx.textBaseline='alphabetic';

    cx.fillStyle=FG; cx.globalAlpha=.3;
    cx.font='800 9px system-ui,sans-serif';
    cx.textAlign='right'; cx.fillText('B E L T  '+(lvl+1), W-18, H-20);
    cx.textAlign='center';
    if(score===0){
      cx.globalAlpha=.3+.18*Math.sin(performance.now()/200);
      cx.font='600 13px system-ui,sans-serif';
      cx.fillText('tap to let go — aim for the white mark', W/2, H*.86);
    }
    cx.globalAlpha=1;
  }

  // belt flash
  if(flash>0){
    cx.fillStyle='#FFFFFF'; cx.globalAlpha=flash*(REDU?.03:.06);
    cx.fillRect(0,0,W,H); cx.globalAlpha=1;
  }
  // film grain
  if(grainPat){ cx.fillStyle=grainPat; cx.fillRect(0,0,W,H); }
  // death flash
  if(dflash>0){
    cx.fillStyle=REDD; cx.globalAlpha=dflash*(REDU?.05:.11);
    cx.fillRect(0,0,W,H); cx.globalAlpha=1;
  }
}

// ---------- input ----------
window.addEventListener('pointerdown',e=>{ audio(); attempt(); },{passive:true});
window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  if(e.code==='Space'||e.code==='Enter'||e.code==='KeyJ'){
    e.preventDefault(); audio(); attempt();
  }
});
document.getElementById('bMute').addEventListener('pointerdown',e=>{
  e.stopPropagation(); audio(); muted=!muted;
  if(master) master.gain.value=muted?0:.5;
  e.currentTarget.textContent=muted?'∅':'♪';
});
const mB=document.getElementById('mBest');

// ---------- main ----------
let last=performance.now();
function frame(t){
  requestAnimationFrame(frame);
  const dt=Math.min(.033,(t-last)/1000); last=t;
  if(document.hidden) return;
  update(dt);
  render();
  if(state==='menu' && best>0){ mB.style.display='block'; mB.textContent='best '+best; }
}
window.addEventListener('resize',resize);
resize();
buildWorld();
requestAnimationFrame(frame);
</script>
